name: Builder (edge)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build ${{ matrix.arch }} optim-on-edge
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: version
        run: |
          echo "version=$(grep '^version:' optim-on-edge/config.yaml | awk '{print $2}' | tr -d '"')" >> $GITHUB_OUTPUT

      - name: Read build_from
        id: build_from
        run: |
          echo "image=$(grep '${{ matrix.arch }}:' optim-on-edge/build.yaml | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./optim-on-edge
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-addon-optim-on-edge:${{ steps.version.outputs.version }}
          build-args: |
            BUILD_FROM=${{ steps.build_from.outputs.image }}
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_NAME=OPTIM-ON Edge
            BUILD_DESCRIPTION=OPTIM-ON edge (development) builds by DOMOPTI
